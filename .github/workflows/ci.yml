name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: the verify job only needs to read the repo.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (not mutable tags) so a re-pointed tag
      # can't silently change CI; persist-credentials:false keeps GITHUB_TOKEN out
      # of .git/config for later steps (incl. dependency install scripts).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # Install Node 24 FIRST, so corepack (next) pins pnpm under the SAME Node
      # the build runs on. Enabling corepack before setup-node bound the pnpm
      # shim to the runner's pre-installed Node, then setup-node switched away
      # from it — fragile, and the cache:pnpm resolution could miss (#17). No
      # cache here yet: pnpm doesn't exist until corepack enables it.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc" # Node 24 LTS
      # corepack pins the package manager to package.json's `packageManager`
      # field (pnpm@11.9.0) — the runner can't silently use a different pnpm.
      - name: Enable corepack
        run: corepack enable
      # Re-run setup-node now that pnpm exists on Node 24, to wire the pnpm store
      # cache (the documented corepack + cache:pnpm ordering). Node is already
      # installed, so this only sets up caching.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc" # Node 24 LTS
          cache: pnpm
      # --frozen-lockfile: fail if pnpm-lock.yaml doesn't match the manifests
      # (no silent drift). Build scripts run only for the reviewed allow-list in
      # pnpm-workspace.yaml; the 5-day minimumReleaseAge cooldown is enforced here.
      - name: "Install (workspace: app + fix-engine)"
        run: pnpm install --frozen-lockfile
      # Supply-chain gate: fail the build on known vulnerabilities.
      - name: Audit
        run: pnpm audit --audit-level=high
      # Story tests run play fns + axe in headless Chromium.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      # The full gate: typecheck · lint · story coverage · engine tests ·
      # fix-client smoke · story tests (play + axe) · static build · storybook build.
      - name: Verify
        run: pnpm run verify
